name: Deploy EEPIP to Production

on:
  push:
    tags:
      - 'v*'

env:
  PROD_HOST: ${{ secrets.PROD_HOST }}
  PROD_USER: ${{ secrets.PROD_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Build Backend
        run: |
          cd backend
          mvn clean package -DskipTests
      
      - name: Build Frontend
        run: |
          cd react-mlm-conversion
          npm install
          npm run build
      
      - name: Build Docker images
        run: |
          docker build -t temco-eepip-backend:${{ github.ref_name }} backend/
          docker build -t temco-eepip-frontend:${{ github.ref_name }} react-mlm-conversion/
      
      - name: Save Docker images
        run: |
          docker save temco-eepip-backend:${{ github.ref_name }} | gzip > backend-image.tar.gz
          docker save temco-eepip-frontend:${{ github.ref_name }} | gzip > frontend-image.tar.gz
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts
      
      - name: Transfer images to production
        run: |
          scp backend-image.tar.gz ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/tmp/
          scp frontend-image.tar.gz ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/tmp/
      
      - name: Deploy on production
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'ENDSSH'
            docker load < /tmp/backend-image.tar.gz
            docker load < /tmp/frontend-image.tar.gz
            docker tag temco-eepip-backend:${{ github.ref_name }} temco-eepip-backend:latest
            docker tag temco-eepip-frontend:${{ github.ref_name }} temco-eepip-frontend:latest
            docker stop temco-eepip temco-eepip-fe || true
            docker rm temco-eepip temco-eepip-fe || true
            docker run -d --name temco-eepip -p 127.0.0.1:8089:8080 temco-eepip-backend:latest
            docker run -d --name temco-eepip-fe -p 127.0.0.1:3005:80 temco-eepip-frontend:latest
            rm /tmp/backend-image.tar.gz /tmp/frontend-image.tar.gz
          ENDSSH
      
      - name: Run database migrations
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ -f scripts/migrations/v${VERSION}_*.sql ]; then
            for file in scripts/migrations/v${VERSION}_*.sql; do
              ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "mysql -u root -p${{ secrets.DB_PASSWORD }} temco_system < $file"
            done
          fi
      
      - name: Health Check - Backend
        run: |
          sleep 30
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "curl -f http://localhost:8089/eepip-api/api/health || exit 1"
      
      - name: Health Check - Frontend
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} "curl -f http://localhost:3005/ || exit 1"
